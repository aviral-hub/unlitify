<!-- Floating Header -->
    <header
        class="fixed top-6 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-6xl z-50 rounded-full border border-neutral-200/40 dark:border-neutral-800/40 backdrop-blur-xl transition-all duration-300"
        :class="{ 'bg-brand-dark/60': darkMode, 'bg-brand-owhite-200/60': !darkMode }"
        x-data="{ 
            activeLogo: 1,
            init() {
                setInterval(() => {
                    this.activeLogo = this.activeLogo === 1 ? 2 : 1;
                }, 5000); // Swaps every 5000ms (5 seconds)
            }
        }">
        <div class="px-6 h-14 flex items-center justify-between">

            <!-- Dynamic Auto-Swapping Logo Container -->
            <div class="relative flex items-center h-9 w-56 overflow-hidden">
                
                <!-- Variant 1: Subtext Logo Layout -->
                <div class="absolute inset-0 flex items-center transition-all duration-700 ease-in-out"
                     x-show="activeLogo === 1"
                     x-transition:enter="transition ease-out duration-500 transform"
                     x-transition:enter-start="opacity-0 translate-y-2"
                     x-transition:enter-end="opacity-100 translate-y-0"
                     x-transition:leave="transition ease-in duration-400 transform"
                     x-transition:leave-start="opacity-100 translate-y-0"
                     x-transition:leave-end="opacity-0 -translate-y-2">
                    <svg id="variant-subtext-logo" class="h-9 w-auto text-brand-orange" viewBox="0 0 460 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g class="prism-core" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <g transform="translate(10, 10)">
                                <polygon class="prism-facet" points="25,50 50,20 75,35" fill="currentColor" fill-opacity="0.1" stroke="currentColor"/>
                                <polygon class="prism-facet" points="25,50 75,35 65,75" fill="none" stroke="currentColor"/>
                                <polygon class="prism-facet" points="75,35 50,20 85,45" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
                                <polygon class="prism-facet" points="65,75 75,35 85,45" fill="none" stroke="currentColor"/>
                                <line class="prism-ray" x1="25" y1="50" x2="85" y2="45" stroke="currentColor" stroke-opacity="0.4"/>
                            </g>
                        </g>
                        <text x="125" y="66" :fill="darkMode ? '#FAF8F5' : '#0A0A0A'" font-family="'Inter', sans-serif" font-size="38" font-weight="900" letter-spacing="0.01em">UNLITIFY</text>
                        <text x="127" y="95" fill="currentColor" font-family="'Inter', sans-serif" font-size="13" font-weight="800" letter-spacing="0.32em">GROWTH PARTNER</text>
                    </svg>
                </div>

                <!-- Variant 2: Inline Architecture Layout -->
                <div class="absolute inset-0 flex items-center transition-all duration-700 ease-in-out"
                     x-show="activeLogo === 2"
                     x-transition:enter="transition ease-out duration-500 transform"
                     x-transition:enter-start="opacity-0 translate-y-2"
                     x-transition:enter-end="opacity-100 translate-y-0"
                     x-transition:leave="transition ease-in duration-400 transform"
                     x-transition:leave-start="opacity-100 translate-y-0"
                     x-transition:leave-end="opacity-0 -translate-y-2">
                    <svg id="variant-inline-logo" class="h-7 w-auto text-brand-orange" viewBox="0 0 520 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g class="prism-core" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polygon class="prism-facet" points="25,50 50,20 75,35" fill="currentColor" fill-opacity="0.1" stroke="currentColor"/>
                            <polygon class="prism-facet" points="25,50 75,35 65,75" fill="none" stroke="currentColor"/>
                            <polygon class="prism-facet" points="75,35 50,20 85,45" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
                            <polygon class="prism-facet" points="65,75 75,35 85,45" fill="none" stroke="currentColor"/>
                            <line class="prism-ray" x1="25" y1="50" x2="85" y2="45" stroke="currentColor" stroke-opacity="0.4"/>
                        </g>
                        <text x="115" y="63" :fill="darkMode ? '#FAF8F5' : '#0A0A0A'" font-family="'Inter', sans-serif" font-size="34" font-weight="900" letter-spacing="-0.01em">UNLITIFY</text>
                        <text x="285" y="63" :fill="darkMode ? '#A3A3A3' : '#71717A'" font-family="'Inter', sans-serif" font-size="34" font-weight="400" letter-spacing="-0.02em">Growth Partner</text>
                    </svg>
                </div>

            </div>

            <!-- Expanded Desktop Navigation Links -->
            <nav class="hidden lg:flex items-center gap-5 text-[10px] uppercase tracking-widest font-bold opacity-80">
                <a href="#services" class="hover:text-brand-orange transition-colors">Services</a>
                <a href="#what-we-do" class="hover:text-brand-orange transition-colors">Capabilities</a>
                <a href="#story" class="hover:text-brand-orange transition-colors">Our Story</a>
                <a href="#faq" class="hover:text-brand-orange transition-colors">Doubts</a>
                <a href="#geo-coordinates" class="hover:text-brand-orange transition-colors">Global Node</a>
            </nav>

            <!-- Actions Shell -->
            <div class="flex items-center gap-2 sm:gap-3">
                <!-- Theme Toggle Button -->
                <button @click="darkMode = !darkMode" class="p-1.5 rounded-full hover:bg-neutral-500/10 transition-colors" aria-label="Toggle System Theme">
                    <template x-if="darkMode">
                        <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m2.828 9.9a5 5 0 117.072 0 5 5 0 01-7.072 0z"/></svg>
                    </template>
                    <template x-if="!darkMode">
                        <svg class="w-4 h-4 text-neutral-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </template>
                </button>

                <!-- CTA Primary Button -->
                <a href="#contact"
                    class="hidden sm:inline-block bg-brand-orange text-white text-[10px] font-bold uppercase tracking-widest px-4 py-2 rounded-full hover:bg-orange-600 transition-all">
                    Start Growing
                </a>

                <!-- Mobile Navigation Trigger Menu Button -->
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden p-1.5 rounded-full hover:bg-neutral-500/10 transition-colors" aria-label="Toggle Mobile Menu">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path :class="{'hidden': mobileMenuOpen, 'inline-flex': !mobileMenuOpen }" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"/>
                        <path :class="{'hidden': !mobileMenuOpen, 'inline-flex': mobileMenuOpen }" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Dropdown Mobile Menu System Panel (Alpine JS controlled) -->
        <div x-show="mobileMenuOpen" 
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-4"
             class="lg:hidden px-6 pb-6 pt-2 flex flex-col gap-4 border-t border-neutral-200/20 dark:border-neutral-800/20"
             @click.away="mobileMenuOpen = false">
            <a href="#services" @click="mobileMenuOpen = false" class="text-xs uppercase tracking-wider font-bold py-1 hover:text-brand-orange transition-colors">Services</a>
            <a href="#what-we-do" @click="mobileMenuOpen = false" class="text-xs uppercase tracking-wider font-bold py-1 hover:text-brand-orange transition-colors">Capabilities</a>
            <a href="#story" @click="mobileMenuOpen = false" class="text-xs uppercase tracking-wider font-bold py-1 hover:text-brand-orange transition-colors">Our Story</a>
            <a href="#faq" @click="mobileMenuOpen = false" class="text-xs uppercase tracking-wider font-bold py-1 hover:text-brand-orange transition-colors">Doubts</a>
            <a href="#geo-coordinates" @click="mobileMenuOpen = false" class="text-xs uppercase tracking-wider font-bold py-1 hover:text-brand-orange transition-colors">Global Node</a>
            <a href="#contact" @click="mobileMenuOpen = false" class="sm:hidden block text-center bg-brand-orange text-white text-xs font-bold uppercase tracking-widest py-2.5 rounded-full hover:bg-orange-600 transition-all mt-2">
                Start Growing
            </a>
        </div>
    </header>

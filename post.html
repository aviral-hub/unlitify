<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlitify // Team Spotlight Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0F0F11;
            color: #F5F5F7;
        }

        .canvas-container canvas {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
        }
    </style>
</head>

<body class="p-6 md:p-12 min-h-screen">

    <header class="max-w-6xl mx-auto mb-12 flex justify-between items-center border-b border-zinc-800 pb-6">
        <div>
            <span class="text-xs font-bold tracking-[0.3em] uppercase text-[#ffaa00]">Media Engine</span>
            <h1 class="text-3xl font-black tracking-tighter uppercase mt-1">TEAM SPOTLIGHT GENERATOR</h1>
        </div>
        <div class="text-right font-mono text-xs text-zinc-500">
            Export Target // Instagram Square (1080x1080)
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12">

        <!-- Controls Column -->
        <div class="lg:col-span-5 bg-[#161619] p-6 rounded-3xl border border-zinc-800/80 shadow-2xl h-fit space-y-6">
            <div>
                <h2 class="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-4">01. Team Member Identity
                    Metrics</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-zinc-500 mb-1">Full Name</label>
                        <input type="text" id="member-name" value="AVIRAL PATHAK" class="w-full bg-[#0F0F11] border border-zinc-800 rounded-xl px-4 py-2.5 text-sm font-bold tracking-wide text-white focus:outline-none focus:border-[#7a00ff]">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-zinc-500 mb-1">Corporate Title / Role</label>
                        <input type="text" id="member-title" value="CHIEF EXECUTIVE ENGINE" class="w-full bg-[#0F0F11] border border-zinc-800 rounded-xl px-4 py-2.5 text-sm font-bold tracking-wide text-white focus:outline-none focus:border-[#7a00ff]">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-zinc-500 mb-1">Studio Accent Statement</label>
                        <input type="text" id="member-quote" value="ENGINEERING SYSTEMIC CLARITY EVERY SINGLE SPRINT." class="w-full bg-[#0F0F11] border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-zinc-300 focus:outline-none focus:border-[#7a00ff]">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-zinc-500 mb-1">Transparent Portrait (PNG Layer)</label>
                        <div
                            class="relative group mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-zinc-800 border-dashed rounded-xl hover:border-zinc-700 transition cursor-pointer bg-[#0F0F11]">
                            <div class="space-y-1 text-center">
                                <svg class="mx-auto h-8 w-8 text-zinc-600 group-hover:text-zinc-500"
                                    stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                    <path
                                        d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4-4m4-24h8m-4-4v8m-12 4h.02"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                                <div class="flex text-xs text-zinc-400">
                                    <label for="image-upload" class="relative cursor-pointer rounded-md font-semibold text-[#ffaa00] hover:text-amber-400 focus-within:outline-none">
                                        <span>Upload profile image</span>
                                        <input id="image-upload" type="file" accept="image/*" class="sr-only">
                                    </label>
                                </div>
                                <p class="text-[10px] text-zinc-600">Transparent background PNG works best</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-zinc-800">
                <h3 class="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Composition Options</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button id="theme-btn" class="bg-[#0F0F11] border border-zinc-800 text-xs font-bold py-2.5 rounded-xl hover:bg-zinc-900 transition">THEME: DARK</button>
                    <button id="pos-btn" class="bg-[#0F0F11] border border-zinc-800 text-xs font-bold py-2.5 rounded-xl hover:bg-zinc-900 transition">IMAGE: LEFT</button>
                </div>
            </div>
        </div>

        <!-- Render Viewport Output -->
        <div class="lg:col-span-7 bg-[#161619] p-6 rounded-3xl border border-zinc-800/80 space-y-4 shadow-2xl h-fit">
            <div class="flex justify-between items-center">
                <div>
                    <h3 class="text-sm font-black uppercase tracking-wider">Canvas Frame Matrix</h3>
                    <p class="text-xs text-zinc-500">Live Render Window // Downsampled Viewport</p>
                </div>
                <button onclick="downloadSpotlight()" class="bg-[#7a00ff] hover:bg-[#6400d6] text-white text-xs font-bold uppercase tracking-widest px-5 py-2.5 rounded-xl transition shadow-lg">Bake PNG</button>
            </div>

            <div class="canvas-container bg-[#0F0F11] p-3 rounded-2xl border border-zinc-900 flex justify-center">
                <canvas id="spotlight-canvas" width="1080" height="1080"></canvas>
            </div>
        </div>
    </main>

    <script>
        const nameInput = document.getElementById('member-name');
        const titleInput = document.getElementById('member-title');
        const quoteInput = document.getElementById('member-quote');
        const fileInput = document.getElementById('image-upload');
        const themeBtn = document.getElementById('theme-btn');
        const posBtn = document.getElementById('pos-btn');

        let uploadedImage = null;
        let activeTheme = 'dark'; // dark | light
        let imagePosition = 'left'; // left | right

        // Default placeholder fallback graphics loop (draws a clean abstract human shape if no image uploaded)
        function drawPlaceholderAvatar(ctx, x, y, w, h) {
            ctx.save();
            ctx.fillStyle = activeTheme === 'dark' ? '#1A1A1E' : '#EBEBEF';
            ctx.beginPath();
            ctx.arc(x + w/2, y + h/3, h/5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w/2, y + h, h/2, Math.PI, 0);
            ctx.fill();
            ctx.restore();
        }

        // Draw your original symmetric/asymmetric quantum prism logo mark component
        function drawQuantumLogo(ctx, x, y, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath(); ctx.moveTo(25, 50); ctx.lineTo(50, 20); ctx.lineTo(75, 35); ctx.closePath();
            ctx.fillStyle = 'rgba(122, 0, 255, 0.15)'; ctx.fill(); ctx.strokeStyle = '#7a00ff'; ctx.stroke();

            ctx.beginPath(); ctx.moveTo(25, 50); ctx.lineTo(75, 35); ctx.lineTo(65, 75); ctx.closePath();
            ctx.fillStyle = '#111115'; ctx.fill(); ctx.strokeStyle = '#ffaa00'; ctx.stroke();

            ctx.beginPath(); ctx.moveTo(75, 35); ctx.lineTo(50, 20); ctx.lineTo(85, 45); ctx.closePath();
            ctx.strokeStyle = '#7a00ff'; ctx.stroke();

            ctx.beginPath(); ctx.moveTo(65, 75); ctx.lineTo(75, 35); ctx.lineTo(85, 45); ctx.closePath();
            ctx.fillStyle = '#111115'; ctx.fill(); ctx.strokeStyle = '#ffaa00'; ctx.stroke();

            ctx.restore();
        }

        function buildSpotlightFrame() {
            const canvas = document.getElementById('spotlight-canvas');
            const ctx = canvas.getContext('2d');
            
            const isDark = activeTheme === 'dark';
            const bgColor = isDark ? '#0F0F11' : '#F5F5F7';
            const primaryTextColor = isDark ? '#FFFFFF' : '#111115';
            const secondaryTextColor = '#71717A';
            const primaryAccent = '#7a00ff';
            const secondaryAccent = '#ffaa00';

            // 1. Draw Clean Background Layer Canvas
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Architectural Structural Blueprint Grid Accent Layout Lines
            ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.02)' : 'rgba(0, 0, 0, 0.03)';
            ctx.lineWidth = 2;
            const stepSize = 60;
            for(let g = 0; g < canvas.width; g += stepSize) {
                ctx.beginPath(); ctx.moveTo(g, 0); ctx.lineTo(g, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, g); ctx.lineTo(canvas.width, g); ctx.stroke();
            }

            // 2. Compute Layout Layout Dynamic Geometry Matrix Bounds
            const imgW = 540;
            const imgH = 880;
            const imgX = imagePosition === 'left' ? 60 : 480;
            const imgY = 140;

            const textX = imagePosition === 'left' ? 640 : 100;

            // Subtle Architectural Backdrop Frame behind the portrait layer
            ctx.fillStyle = isDark ? '#161619' : '#FFFFFF';
            ctx.fillRect(imgX, imgY, imgW, imgH);
            ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.06)';
            ctx.strokeRect(imgX, imgY, imgW, imgH);

            // 3. Render Profile Image Frame
            if (uploadedImage) {
                ctx.save();
                // Create a clipping boundary inside the container block
                ctx.beginPath();
                ctx.rect(imgX, imgY, imgW, imgH);
                ctx.clip();
                
                // Scale calculations keeping proportional aspect balance
                const wrh = uploadedImage.width / uploadedImage.height;
                const crh = imgW / imgH;
                let drawW = imgW;
                let drawH = imgH;
                let offsetX = 0;
                let offsetY = 0;

                if (wrh > crh) {
                    drawW = imgH * wrh;
                    offsetX = -(drawW - imgW) / 2;
                } else {
                    drawH = imgW / wrh;
                    offsetY = -(drawH - imgH) / 2;
                }

                ctx.drawImage(uploadedImage, imgX + offsetX, imgY + offsetY, drawW, drawH);
                ctx.restore();
            } else {
                drawPlaceholderAvatar(ctx, imgX, imgY, imgW, imgH);
            }

            // 4. Render Typographic Infrastructure
            // Top Right/Left Global Logo Brand Seal
            drawQuantumLogo(ctx, textX, 140, 1.2);
            ctx.fillStyle = primaryTextColor;
            ctx.font = '900 32px "Plus Jakarta Sans"';
            ctx.fillText('UNLITIFY', textX + 90, 180);

            // Spotlight Subhead Tag Label Element
            ctx.fillStyle = primaryAccent;
            ctx.font = '800 12px "Plus Jakarta Sans"';
            ctx.letterSpacing = "4px";
            ctx.fillText("CORE DIVISION TEAM MEMBER // STATUS ACTIVE", textX, 320);

            // Core Profile Identity Main Typography Stack
            ctx.fillStyle = primaryTextColor;
            ctx.font = '900 68px "Plus Jakarta Sans"';
            ctx.letterSpacing = "-2px";
            
            // Wrap long names safely down a line if over 14 characters long
            const nameRaw = nameInput.value.toUpperCase();
            if (nameRaw.length > 14) {
                const spaceIndex = nameRaw.indexOf(' ');
                if(spaceIndex !== -1) {
                    ctx.fillText(nameRaw.substring(0, spaceIndex), textX, 420);
                    ctx.fillText(nameRaw.substring(spaceIndex + 1), textX, 495);
                } else {
                    ctx.fillText(nameRaw, textX, 420);
                }
            } else {
                ctx.fillText(nameRaw, textX, 420);
            }

            // Title Tag Placement Engine Layer
            ctx.fillStyle = secondaryAccent;
            ctx.font = '800 15px "Plus Jakarta Sans"';
            ctx.letterSpacing = "3px";
            ctx.fillText(titleInput.value.toUpperCase(), textX, 550);

            // Statement Quote Block text wrapping mechanics
            ctx.fillStyle = isDark ? '#E4E4E7' : '#3F3F46';
            ctx.font = '500 20px "Plus Jakarta Sans"';
            ctx.letterSpacing = "0px";
            
            const words = quoteInput.value.toUpperCase().split(' ');
            let line = '';
            let currentLineY = 640;
            const maxWidth = 380;
            const lineHeight = 30;

            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    ctx.fillText(line, textX, currentLineY);
                    line = words[n] + ' ';
                    currentLineY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, textX, currentLineY);

            // Accent Decorative Graphic Bottom Block Element
            ctx.fillStyle = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            ctx.fillRect(textX, 995, 380, 2);
            
            ctx.fillStyle = secondaryTextColor;
            ctx.font = '700 11px "Plus Jakarta Sans"';
            ctx.letterSpacing = "2px";
            ctx.fillText("RUN PROTOCOL: UNLITIFY.VERCEL.APP", textX, 1015);
        }

        // File pipeline configuration conversion interface
        fileInput.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedImage = new Image();
                uploadedImage.onload = function() {
                    buildSpotlightFrame();
                }
                uploadedImage.src = event.target.result;
            }
            if(e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Toggle State Switches Execution
        themeBtn.addEventListener('click', () => {
            activeTheme = activeTheme === 'dark' ? 'light' : 'dark';
            themeBtn.innerText = `THEME: ${activeTheme.toUpperCase()}`;
            buildSpotlightFrame();
        });

        posBtn.addEventListener('click', () => {
            imagePosition = imagePosition === 'left' ? 'right' : 'left';
            posBtn.innerText = `IMAGE: ${imagePosition.toUpperCase()}`;
            buildSpotlightFrame();
        });

        // Instant variable reactive live-baking keystroke inputs
        nameInput.addEventListener('input', buildSpotlightFrame);
        titleInput.addEventListener('input', buildSpotlightFrame);
        quoteInput.addEventListener('input', buildSpotlightFrame);

        function downloadSpotlight() {
            const canvas = document.getElementById('spotlight-canvas');
            const targetLink = document.createElement('a');
            const parsedName = nameInput.value.toLowerCase().replace(/\s+/g, '-');
            targetLink.download = `unlitify-spotlight-${parsedName}.png`;
            targetLink.href = canvas.toDataURL("image/png");
            targetLink.click();
        }

        // Window entry initialization
        window.addEventListener('load', () => {
            setTimeout(buildSpotlightFrame, 300);
        });
    </script>
</body>

</html>
